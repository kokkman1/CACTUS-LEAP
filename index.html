<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하이에나 런</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        <div id="game-ui">
            <span id="ui-name">GUEST</span> | Score: <span id="ui-score">0</span>
        </div>

        <div id="start-screen">
            <div id="mobile-ui-wrapper">
                <input type="text" id="player-name" placeholder="닉네임을 입력하세요" maxlength="8">
                <button onclick="startGame()" class="btn-start">START GAME</button>
                <button onclick="showRanking()" class="btn-rank">RANKING</button>
            </div>
        </div>

        <div id="gameover-screen" class="hidden">
            <h1>GAME OVER</h1>
            <p id="final-score">Score: 0</p>
            <div id="gameover-buttons">
                <button onclick="resetGame()">RETRY</button>
                <button onclick="showRanking()">RANKING</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="game.js"></script>
</body>
</html>
